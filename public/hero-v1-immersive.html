<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIBB Hero - V1 Full Immersive</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a227;
      --gold-light: #d4b655;
      --navy: #0c1b33;
      --white: #ffffff;
      --text-muted: #5a5a6e;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #f8f6f1;
      color: #1a1a2e;
      overflow-x: hidden;
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201, 162, 39, 0.2);
    }

    .logo {
      font-family: 'Cormorant', serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--gold);
      text-decoration: none;
      letter-spacing: 0.1em;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-cta {
      border: 1px solid var(--gold);
      color: var(--gold);
      padding: 0.75rem 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s;
    }

    .nav-cta:hover {
      background: var(--gold);
      color: white;
    }

    /* Hero Section */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .hero-image-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 80px;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Bottom Content Bar */
    .hero-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(255,255,255,0.98) 0%, rgba(255,255,255,0.95) 70%, transparent 100%);
      padding: 3rem 4rem 2rem;
    }

    .hero-bottom-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 4rem;
    }

    .hero-tagline {
      max-width: 500px;
    }

    .hero-tagline h2 {
      font-family: 'Cormorant', serif;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .hero-tagline h2 em {
      font-style: italic;
      color: var(--gold);
    }

    .hero-tagline p {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.7;
      font-weight: 300;
    }

    .hero-ctas {
      display: flex;
      gap: 1rem;
    }

    .cta-primary {
      background: var(--gold);
      color: white;
      padding: 1rem 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
    }

    .cta-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    .cta-secondary {
      border: 1px solid var(--text-muted);
      color: #1a1a2e;
      padding: 1rem 2.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s;
    }

    .cta-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Scroll Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      animation: bounce 2s infinite;
    }

    .scroll-indicator .material-symbols-outlined {
      font-size: 1.5rem;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-10px); }
      60% { transform: translateX(-50%) translateY(-5px); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav {
        padding: 1rem 1.5rem;
      }
      .nav-links {
        display: none;
      }
      .hero-bottom {
        padding: 2rem 1.5rem 1.5rem;
      }
      .hero-bottom-content {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 1.5rem;
      }
      .hero-tagline h2 {
        font-size: 1.5rem;
      }
      .hero-ctas {
        flex-direction: column;
        width: 100%;
      }
      .cta-primary, .cta-secondary {
        text-align: center;
      }
      .scroll-indicator {
        display: none;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">JIBB</a>
    <ul class="nav-links">
      <li><a href="#">About Us</a></li>
      <li><a href="#">Key Sectors</a></li>
      <li><a href="#">Innovation Hub</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <a href="#" class="nav-cta">Join Us</a>
  </nav>

  <section class="hero">
    <div class="hero-image-container">
      <img src="hero-illustration.webp" alt="Japan India Business Bureau - Connecting Japan and India" class="hero-image">
    </div>

    <div class="scroll-indicator">
      <span>Scroll</span>
      <span class="material-symbols-outlined">expand_more</span>
    </div>

    <div class="hero-bottom">
      <div class="hero-bottom-content">
        <div class="hero-tagline">
          <h2>Enabling the Next Global <em>Manufacturing Shift</em></h2>
          <p>Connecting stakeholders, businesses, and governments to build lasting partnerships between Japan and India.</p>
        </div>
        <div class="hero-ctas">
          <a href="#" class="cta-primary">Get Started</a>
          <a href="#" class="cta-secondary">Learn More</a>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
