<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIBB Hero - V8 Minimal Bottom Bar</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a227;
      --gold-light: #d4b655;
      --cream: #f8f6f1;
      --navy: #0c1b33;
      --text-muted: #5a5a6e;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: #1a1a2e;
    }

    /* Minimal Navigation */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant', serif;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: 0.15em;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover {
      color: var(--gold);
    }

    .nav-cta {
      background: var(--navy);
      color: white;
      padding: 0.7rem 1.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s;
    }

    .nav-cta:hover {
      background: var(--gold);
    }

    /* Hero */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Image Container - Takes most space */
    .hero-image-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    /* Bottom Bar */
    .hero-bar {
      background: white;
      padding: 1.5rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(201,162,39,0.15);
    }

    .bar-left {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .bar-tagline {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .tagline-icon {
      width: 50px;
      height: 50px;
      border: 1px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tagline-icon .material-symbols-outlined {
      font-size: 1.5rem;
      color: var(--gold);
    }

    .tagline-text h2 {
      font-family: 'Cormorant', serif;
      font-size: 1.25rem;
      font-weight: 400;
      margin-bottom: 0.15rem;
    }

    .tagline-text h2 em {
      font-style: italic;
      color: var(--gold);
    }

    .tagline-text p {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .bar-divider {
      width: 1px;
      height: 40px;
      background: rgba(201,162,39,0.2);
    }

    .bar-locations {
      display: flex;
      gap: 2rem;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .location-code {
      font-family: 'Cormorant', serif;
      font-size: 1rem;
      color: var(--gold);
      font-weight: 500;
    }

    .location-name {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .bar-right {
      display: flex;
      gap: 1rem;
    }

    .cta-primary {
      background: var(--gold);
      color: white;
      padding: 0.9rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .cta-primary:hover {
      background: var(--gold-light);
    }

    .cta-secondary {
      border: 1px solid #ddd;
      color: var(--navy);
      padding: 0.9rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.3s;
    }

    .cta-secondary:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .bar-locations {
        display: none;
      }
      .bar-divider {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .nav {
        padding: 1rem 1.5rem;
      }
      .nav-links {
        display: none;
      }
      .hero-bar {
        flex-direction: column;
        gap: 1.5rem;
        padding: 1.5rem;
        text-align: center;
      }
      .bar-left {
        flex-direction: column;
        gap: 1rem;
      }
      .bar-tagline {
        flex-direction: column;
        text-align: center;
      }
      .bar-right {
        width: 100%;
        flex-direction: column;
      }
      .cta-primary, .cta-secondary {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">JIBB</a>
    <div class="nav-right">
      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a href="#">Sectors</a></li>
        <li><a href="#">Innovation</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <a href="#" class="nav-cta">Join Us</a>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-image-container">
      <img src="hero-illustration.webp" alt="JIBB - Bridging Japan and India" class="hero-image">
    </div>

    <div class="hero-bar">
      <div class="bar-left">
        <div class="bar-tagline">
          <div class="tagline-icon">
            <span class="material-symbols-outlined">handshake</span>
          </div>
          <div class="tagline-text">
            <h2>Enabling the Next <em>Manufacturing Shift</em></h2>
            <p>Building bridges between Japan and India</p>
          </div>
        </div>

        <div class="bar-divider"></div>

        <div class="bar-locations">
          <div class="location">
            <span class="location-code">JP</span>
            <span class="location-name">Tokyo</span>
          </div>
          <div class="location">
            <span class="location-code">IN</span>
            <span class="location-name">Noida</span>
          </div>
        </div>
      </div>

      <div class="bar-right">
        <a href="#" class="cta-primary">
          Get Started
          <span class="material-symbols-outlined">east</span>
        </a>
        <a href="#" class="cta-secondary">Learn More</a>
      </div>
    </div>
  </section>
</body>
</html>
