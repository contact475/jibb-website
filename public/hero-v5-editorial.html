<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIBB Hero - V5 Editorial Minimal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a227;
      --gold-light: #d4b655;
      --cream: #faf9f6;
      --navy: #0c1b33;
      --text-dark: #1a1a2e;
      --text-muted: #6b6b7b;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: var(--text-dark);
    }

    /* Navigation - Ultra Minimal */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 2rem 4rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant', serif;
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--text-dark);
      text-decoration: none;
      letter-spacing: 0.15em;
    }

    .nav-links {
      display: flex;
      gap: 3rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }

    .nav-links a:hover {
      color: var(--text-dark);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-cta {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: gap 0.3s;
    }

    .nav-cta:hover {
      gap: 0.75rem;
    }

    .nav-cta .material-symbols-outlined {
      font-size: 1rem;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 4rem;
    }

    .hero-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 100px;
    }

    .hero-image-container {
      position: relative;
      max-width: 1100px;
      width: 100%;
    }

    /* Corner Decorations */
    .corner-deco {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 1px solid var(--gold);
      opacity: 0.4;
    }

    .corner-deco.tl {
      top: -30px;
      left: -30px;
      border-right: none;
      border-bottom: none;
    }

    .corner-deco.tr {
      top: -30px;
      right: -30px;
      border-left: none;
      border-bottom: none;
    }

    .corner-deco.bl {
      bottom: -30px;
      left: -30px;
      border-right: none;
      border-top: none;
    }

    .corner-deco.br {
      bottom: -30px;
      right: -30px;
      border-left: none;
      border-top: none;
    }

    .hero-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Bottom Bar */
    .hero-bottom {
      padding: 2.5rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(201, 162, 39, 0.2);
    }

    .hero-tagline {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .tagline-number {
      font-family: 'Cormorant', serif;
      font-size: 3rem;
      font-weight: 400;
      color: var(--gold);
      opacity: 0.3;
      line-height: 1;
    }

    .tagline-text h2 {
      font-family: 'Cormorant', serif;
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 0.25rem;
    }

    .tagline-text h2 em {
      font-style: italic;
      color: var(--gold);
    }

    .tagline-text p {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 3rem;
    }

    .locations {
      display: flex;
      gap: 2rem;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .location-icon {
      width: 32px;
      height: 32px;
      border: 1px solid rgba(201, 162, 39, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant', serif;
      font-size: 0.8rem;
      color: var(--gold);
    }

    .location-name {
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .cta-primary {
      background: var(--gold);
      color: white;
      padding: 1rem 2rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .cta-primary:hover {
      background: var(--gold-light);
    }

    .cta-primary .material-symbols-outlined {
      font-size: 1rem;
      transition: transform 0.3s;
    }

    .cta-primary:hover .material-symbols-outlined {
      transform: translateX(4px);
    }

    /* Scroll indicator */
    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--gold), transparent);
      animation: scrollPulse 2s infinite;
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 1; height: 40px; }
      50% { opacity: 0.5; height: 30px; }
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .hero {
        padding: 0 2rem;
      }
      .nav {
        padding: 1.5rem 2rem;
      }
      .corner-deco {
        width: 40px;
        height: 40px;
      }
      .corner-deco.tl, .corner-deco.tr { top: -20px; }
      .corner-deco.bl, .corner-deco.br { bottom: -20px; }
      .corner-deco.tl, .corner-deco.bl { left: -20px; }
      .corner-deco.tr, .corner-deco.br { right: -20px; }
      .hero-bottom {
        flex-direction: column;
        gap: 2rem;
        text-align: center;
      }
      .hero-tagline {
        flex-direction: column;
        gap: 1rem;
      }
      .hero-actions {
        flex-direction: column;
        gap: 1.5rem;
      }
      .scroll-hint {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .hero {
        padding: 0 1.5rem;
      }
      .corner-deco {
        display: none;
      }
      .locations {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">JIBB</a>
    <ul class="nav-links">
      <li><a href="#">About</a></li>
      <li><a href="#">Sectors</a></li>
      <li><a href="#">Innovation</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <a href="#" class="nav-cta">
      Join Us
      <span class="material-symbols-outlined">arrow_forward</span>
    </a>
  </nav>

  <section class="hero">
    <div class="hero-main">
      <div class="hero-image-container">
        <div class="corner-deco tl"></div>
        <div class="corner-deco tr"></div>
        <div class="corner-deco bl"></div>
        <div class="corner-deco br"></div>
        <img src="hero-illustration.webp" alt="JIBB - Bridging Japan and India" class="hero-image">
      </div>
    </div>

    <div class="hero-bottom">
      <div class="hero-tagline">
        <span class="tagline-number">01</span>
        <div class="tagline-text">
          <h2>Enabling the Next Global <em>Manufacturing Shift</em></h2>
          <p>Building bridges between Japan and India through meaningful partnerships</p>
        </div>
      </div>

      <div class="hero-actions">
        <div class="locations">
          <div class="location">
            <div class="location-icon">JP</div>
            <span class="location-name">Tokyo</span>
          </div>
          <div class="location">
            <div class="location-icon">IN</div>
            <span class="location-name">Noida</span>
          </div>
        </div>

        <a href="#" class="cta-primary">
          Get Started
          <span class="material-symbols-outlined">east</span>
        </a>
      </div>
    </div>

    <div class="scroll-hint">
      <span class="scroll-line"></span>
      <span>Scroll</span>
    </div>
  </section>
</body>
</html>
