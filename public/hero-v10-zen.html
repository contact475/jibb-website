<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIBB Hero - V10 Ultra Minimal Zen</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #c9a227;
      --gold-light: #d4b655;
      --cream: #fdfcfa;
      --navy: #0c1b33;
      --text-muted: #888;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--cream);
      color: #1a1a2e;
    }

    /* Ultra Minimal Navigation */
    .nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-family: 'Cormorant', serif;
      font-size: 1.2rem;
      font-weight: 400;
      color: var(--navy);
      text-decoration: none;
      letter-spacing: 0.25em;
    }

    .nav-minimal {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-link:hover {
      color: var(--gold);
    }

    .menu-btn {
      width: 32px;
      height: 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .menu-btn span {
      width: 100%;
      height: 1px;
      background: var(--navy);
      transition: all 0.3s;
    }

    .menu-btn:hover span {
      background: var(--gold);
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 0 3rem;
    }

    /* Image - Full Focus */
    .hero-image-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 0 2rem;
    }

    .hero-image-container {
      position: relative;
      max-width: 1200px;
      width: 100%;
    }

    .hero-image {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Subtle Corner Marks */
    .corner-mark {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
      border-width: 0;
      opacity: 0.4;
    }

    .corner-mark.tl {
      top: -10px;
      left: -10px;
      border-top-width: 1px;
      border-left-width: 1px;
    }

    .corner-mark.tr {
      top: -10px;
      right: -10px;
      border-top-width: 1px;
      border-right-width: 1px;
    }

    .corner-mark.bl {
      bottom: -10px;
      left: -10px;
      border-bottom-width: 1px;
      border-left-width: 1px;
    }

    .corner-mark.br {
      bottom: -10px;
      right: -10px;
      border-bottom-width: 1px;
      border-right-width: 1px;
    }

    /* Bottom Strip */
    .hero-bottom {
      padding: 1.5rem 0 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(201,162,39,0.1);
    }

    .bottom-left {
      display: flex;
      align-items: center;
      gap: 3rem;
    }

    .tagline {
      font-family: 'Cormorant', serif;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--navy);
    }

    .tagline em {
      font-style: italic;
      color: var(--gold);
    }

    .locations {
      display: flex;
      gap: 1.5rem;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .location-dot {
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
    }

    .bottom-right {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .cta-text {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .cta-btn {
      width: 50px;
      height: 50px;
      background: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: all 0.3s;
    }

    .cta-btn:hover {
      background: var(--navy);
      transform: scale(1.05);
    }

    .cta-btn .material-symbols-outlined {
      color: white;
      font-size: 1.25rem;
    }

    /* Scroll Hint */
    .scroll-hint {
      position: fixed;
      bottom: 2rem;
      left: 3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-muted);
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .scroll-hint::before {
      content: '';
      width: 30px;
      height: 1px;
      background: var(--gold);
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .hero {
        padding: 0 2rem;
      }
      .nav {
        padding: 1.5rem 2rem;
      }
      .bottom-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
    }

    @media (max-width: 768px) {
      .hero {
        padding: 0 1.5rem;
      }
      .nav {
        padding: 1rem 1.5rem;
      }
      .nav-link {
        display: none;
      }
      .hero-image-wrapper {
        padding: 5rem 0 1.5rem;
      }
      .corner-mark {
        display: none;
      }
      .hero-bottom {
        flex-direction: column;
        gap: 1.5rem;
        text-align: center;
      }
      .bottom-left {
        align-items: center;
      }
      .bottom-right {
        width: 100%;
        justify-content: center;
      }
      .scroll-hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="#" class="logo">JIBB</a>
    <div class="nav-minimal">
      <a href="#" class="nav-link">About</a>
      <a href="#" class="nav-link">Contact</a>
      <button class="menu-btn" aria-label="Menu">
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-image-wrapper">
      <div class="hero-image-container">
        <div class="corner-mark tl"></div>
        <div class="corner-mark tr"></div>
        <div class="corner-mark bl"></div>
        <div class="corner-mark br"></div>
        <img src="hero-illustration.webp" alt="JIBB - Bridging Japan and India" class="hero-image">
      </div>
    </div>

    <div class="hero-bottom">
      <div class="bottom-left">
        <p class="tagline">Enabling the Next Global <em>Manufacturing Shift</em></p>
        <div class="locations">
          <div class="location">
            <span class="location-dot"></span>
            Tokyo, Japan
          </div>
          <div class="location">
            <span class="location-dot"></span>
            Noida, India
          </div>
        </div>
      </div>

      <div class="bottom-right">
        <span class="cta-text">Get Started</span>
        <a href="#" class="cta-btn">
          <span class="material-symbols-outlined">arrow_forward</span>
        </a>
      </div>
    </div>
  </section>

  <div class="scroll-hint">Scroll to explore</div>
</body>
</html>
